version: 1
publish:
  enabled: true
  branch: gh-counter-assets
comment:
  key: self-check
counters:
  - id: todo
    label: TODOs
    matchers:
      - files: ['src/**/*.ts', 'README.md']
        type: contains
        pattern: 'TODO'
    ratchet:
      no_increase: true
      fail: false
    badge:
      label: TODOs
  - id: type-ignore
    label: '@ts-ignore'
    matchers:
      - files: ['src/**/*.ts']
        type: contains
        pattern: '@ts-ignore'
    badge:
      label: '@ts-ignore'
  - id: code-tag
    label: '<code>|`'
    matchers:
      - files: ['src/**/*.ts', 'docs/**/*.md']
        type: contains
        pattern: '<code>'
    badge:
      label: '<code>|`'
